<header class="mbar">
  <div class="top">
    <b>{{ site.author.name }}</b>
    <button class="themebtn" data-theme-toggle aria-label="Toggle color theme">
      <svg class="ico-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
      <svg class="ico-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    </button>
  </div>
  <nav class="mnav" aria-label="Sections">
    {% for link in site.data.navigation.main %}
    <a href="{{ link.url }}">{{ link.title }}</a>
    {% endfor %}
  </nav>
</header>
